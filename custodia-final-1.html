<style>
  :root{
    --tengo:#1f8f5f;
    --tengo-soft:#e4f4ec;
    --notengo:#8a94a6;
    --notengo-soft:#eef0f4;
    --ink:#1a2030;
    --line:#dce0e8;
    --bg:#f6f7f9;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Trebuchet MS',-apple-system,system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 18px 40px;
  }
  .wrap{width:100%;max-width:440px;}
  h1{
    font-size:1.05rem;
    font-weight:normal;
    letter-spacing:.02em;
    color:#5a6273;
    text-align:center;
    margin-bottom:18px;
  }
  .datebox{
    background:#fff;
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px;
    margin-bottom:16px;
  }
  .datebox label{
    display:block;
    font-size:.78rem;
    color:#7a8090;
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:.08em;
  }
  input[type=date]{
    width:100%;
    font-size:1.35rem;
    font-family:inherit;
    border:none;
    background:transparent;
    color:var(--ink);
    font-weight:bold;
  }
  input[type=date]:focus{outline:none;}
  .quick{
    display:flex;
    gap:8px;
    margin-bottom:20px;
  }
  .quick button{
    flex:1;
    padding:11px 4px;
    font-family:inherit;
    font-size:.85rem;
    border:1px solid var(--line);
    background:#fff;
    color:#4a5162;
    border-radius:11px;
    cursor:pointer;
  }
  .quick button:active{background:#eef0f4;}
  .result{
    border-radius:22px;
    padding:34px 24px;
    text-align:center;
    transition:.25s;
  }
  .result.yes{background:var(--tengo-soft);}
  .result.no{background:var(--notengo-soft);}
  .verdict{
    font-size:2.6rem;
    font-weight:bold;
    line-height:1.1;
    margin-bottom:6px;
  }
  .yes .verdict{color:var(--tengo);}
  .no .verdict{color:var(--notengo);}
  .day{
    font-size:1.05rem;
    color:#4a5162;
    margin-bottom:22px;
  }
  .weekinfo{
    display:inline-block;
    background:rgba(255,255,255,.7);
    border-radius:12px;
    padding:10px 16px;
    font-size:.9rem;
    color:#4a5162;
    line-height:1.5;
  }
  .weekinfo b{color:var(--ink);}
  .note{
    font-size:.75rem;
    color:#9aa0ad;
    text-align:center;
    margin-top:24px;
    line-height:1.6;
  }
  .cfg{
    margin-top:20px;
    border-top:1px dashed var(--line);
    padding-top:16px;
  }
  .cfg summary{
    font-size:.82rem;
    color:#7a8090;
    cursor:pointer;
    text-align:center;
  }
  .cfg-body{margin-top:12px;}
  .cfg-body p{font-size:.78rem;color:#7a8090;margin-bottom:8px;line-height:1.5;}
  .cfg-body input[type=date]{
    font-size:1.1rem;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    background:#fff;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Custodia · semana sí, semana no</h1>

  <div class="datebox">
    <label>Consulta un día</label>
    <input type="date" id="q">
  </div>

  <div class="quick">
    <button data-off="0">Hoy</button>
    <button data-off="1">Mañana</button>
    <button data-off="7">En 7 días</button>
  </div>

  <div class="result" id="res">
    <div class="verdict" id="verdict">—</div>
    <div class="day" id="day"></div>
    <div class="weekinfo" id="week"></div>
  </div>

  <details class="cfg">
    <summary>Ajustar semana de referencia</summary>
    <div class="cfg-body">
      <p>Indica un <b>lunes</b> en el que empieza tu semana con él. Por defecto: lunes 6 de julio de 2026.</p>
      <input type="date" id="ref" value="2026-07-06">
    </div>
  </details>

  <div class="note">
    La semana va de lunes a lunes. El lunes por la mañana vuelve con el padre,<br>
    así que ese lunes ya cuenta como semana del padre.
  </div>
</div>

<script>
  const q = document.getElementById('q');
  const ref = document.getElementById('ref');
  const res = document.getElementById('res');
  const verdictEl = document.getElementById('verdict');
  const dayEl = document.getElementById('day');
  const weekEl = document.getElementById('week');

  const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function lunesDeLaSemana(d){
    const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const dow = x.getDay();
    const diff = (dow === 0 ? -6 : 1 - dow);
    x.setDate(x.getDate() + diff);
    return x;
  }

  function fmt(d){
    return dias[d.getDay()] + ', ' + d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
  }
  function fmtCorto(d){
    return d.getDate() + '/' + (d.getMonth()+1);
  }

  function calcular(){
    if(!q.value || !ref.value){ return; }

    const consulta = new Date(q.value + 'T00:00');
    const referencia = new Date(ref.value + 'T00:00');

    const lunConsulta = lunesDeLaSemana(consulta);
    const lunRef = lunesDeLaSemana(referencia);

    const semanas = Math.round((lunConsulta - lunRef) / (7*24*3600*1000));
    const loTengo = (((semanas % 2) + 2) % 2) === 0;

    const finSemana = new Date(lunConsulta);
    finSemana.setDate(finSemana.getDate() + 7);

    res.className = 'result ' + (loTengo ? 'yes' : 'no');
    verdictEl.textContent = loTengo ? 'SÍ lo tienes' : 'NO lo tienes';
    dayEl.textContent = fmt(consulta);

    weekEl.innerHTML =
      'Semana del <b>' + fmtCorto(lunConsulta) + '</b> al <b>' + fmtCorto(finSemana) + '</b><br>' +
      (loTengo ? 'Está contigo esa semana' : 'Está con el padre esa semana');
  }

  document.querySelectorAll('.quick button').forEach(b=>{
    b.addEventListener('click',()=>{
      const off = parseInt(b.dataset.off,10);
      const d = new Date();
      d.setDate(d.getDate()+off);
      q.value = d.toISOString().slice(0,10);
      calcular();
    });
  });

  q.addEventListener('change', calcular);
  ref.addEventListener('change', calcular);

  q.value = new Date().toISOString().slice(0,10);
  calcular();
</script>
</body>
</html>
